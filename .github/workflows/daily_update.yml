name: Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *' # Ogni notte a mezzanotte
  workflow_dispatch: # Permette l'avvio manuale con opzioni
    inputs:
      period:
        description: 'Periodo temporale (es: 1d, 1y, max)'
        required: false
        default: '1d'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Abilita la cache automatica

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # Se avviato manualmente usa l'input, altrimenti usa il default (1d)
        run: python src/main.py ${{ github.event.inputs.period || '1d' }}
